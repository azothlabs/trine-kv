[package]
name = "trine-kv"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
description = "Embedded LSM MVCC key-value database."
readme = "README.md"
documentation = "https://docs.rs/trine-kv"
keywords = ["database", "embedded", "kv", "lsm", "mvcc"]
categories = ["database-implementations"]
include = [
    "/benches",
    "/docs",
    "/examples",
    "/src",
    "/tests",
    "/CHANGELOG.md",
    "/LICENSE-APACHE",
    "/LICENSE-MIT",
    "/README.md",
    "/Cargo.lock",
    "/Cargo.toml",
]

[lib]
name = "trine_kv"
path = "src/lib.rs"

[dependencies]
compio = { version = "0.14.0", default-features = false, features = ["runtime"], optional = true }
compio-driver = { version = "0.7.1", default-features = false, features = ["io-uring"], optional = true }
compio-fs = { version = "0.7.0", default-features = false, features = ["io-uring"], optional = true }
compio-runtime = { version = "0.7.0", default-features = false, features = ["io-uring"], optional = true }
lz4_flex = "0.13.1"

[[bench]]
name = "v1_bench"
harness = false

[lints.rust]
unsafe_code = "warn"

[lints.clippy]
all = "warn"
pedantic = "warn"

[features]
platform-io = ["dep:compio", "dep:compio-driver", "dep:compio-fs", "dep:compio-runtime"]

[target.'cfg(all(target_arch = "wasm32", target_os = "unknown"))'.dependencies]
futures = "0.3.32"
js-sys = "0.3.99"
opfs = "0.2.0"
wasm-bindgen = "0.2.122"
