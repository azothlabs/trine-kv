name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown, wasm32-wasip1

      - name: Format
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-targets --all-features

      - name: Check host targets
        run: |
          cargo check --target wasm32-unknown-unknown --lib
          cargo check --target wasm32-wasip1 --lib

      - name: Lint browser target
        run: cargo clippy --target wasm32-unknown-unknown --lib -- -D warnings

      - name: Run examples
        run: |
          cargo run --example quickstart
          cargo run --example sync_quickstart
          cargo run --example platform_io
          cargo run --example platform_io --features platform-io
          cargo run --example platform_io --features platform-io-native
          cargo run --example user_store
          cargo run --example event_index

      - name: Check package contents
        run: |
          cargo package --list > package-files.txt
          cat package-files.txt
          if grep -E '(^|/)(\.github|\.phrase|\.rust-skills|\.claude)/' package-files.txt; then
            echo "crate package contains local workflow files" >&2
            exit 1
          fi

      - name: Verify package
        run: cargo package --locked

  windows-platform-io:
    name: Windows Platform I/O
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.85.0

      - name: Check platform I/O features
        run: |
          cargo check --features platform-io --tests
          cargo check --features platform-io-native --tests

      - name: Test platform I/O features
        run: |
          cargo test --features platform-io platform_io
          cargo test --features platform-io-native platform_io

      - name: Run platform I/O example
        run: |
          cargo run --example platform_io --features platform-io
          cargo run --example platform_io --features platform-io-native
